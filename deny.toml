# cargo-deny configuration (schema v2)

[advisories]
version = 2
unmaintained = "workspace"
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
skip = []
skip-tree = []

[sources]
allow-git = []
