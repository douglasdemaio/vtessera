# cargo-deny configuration

[advisories]
vulnerability = "deny"
unmaintained = "workspace"
unsound = "workspace"
yanked = "deny"
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
]
deny = []
copyleft = "deny"
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
skip = []
skip-tree = []

[sources]
allow-git = []
