[package]
name = "vtessera-offer"
description = "Vtessera Module 2 — signed machine-readable compute offers (MCP-shaped)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "vtessera_offer"
path = "src/lib.rs"

[dependencies]
serde = { workspace = true }
ed25519-dalek = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }

[dev-dependencies]
# Tests need a CSPRNG for keygen. Production callers pass in a key already
# generated by `vtesserad`, so rand stays out of the library's dep surface.
rand = { workspace = true }
