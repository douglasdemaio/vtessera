[package]
name = "vtessera"
version = "0.1.0"
edition = "2021"
description = "Opt-in compute marketplace client for openSUSE — metering daemon"
license = "Apache-2.0"
repository = "https://github.com/anomalyco/vtessera"

[[bin]]
name = "vtesserad"
path = "src/main.rs"

[features]
default = []
submit = ["ureq"]

[dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"
ed25519-dalek = { version = "2", features = ["rand_core"] }
sha2 = "0.10"
hex = "0.4"
libc = "0.2"
rand = "0.8"

# submit feature only
ureq = { version = "3", optional = true, default-features = false, features = ["rustls"] }

[profile.release]
opt-level = 2
lto = true
strip = true
codegen-units = 1
panic = "abort"
