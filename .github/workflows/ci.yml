name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # cc-rs looks for x86_64-linux-musl-gcc by default; musl-tools ships musl-gcc.
  CC_x86_64_unknown_linux_musl: musl-gcc
  AR_x86_64_unknown_linux_musl: ar

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup show
          rustup target add x86_64-unknown-linux-musl

      - name: Install musl cross-compiler
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Format check
        run: cargo fmt --check

      # vtesserad (v0) — the audited metering daemon. Its dep budget is
      # enforced via Cargo.toml (BUILD.md §1.3); CI gates the surface.
      - name: Clippy vtesserad (default features)
        run: cargo clippy -p vtesserad --all-targets -- -D warnings

      - name: Clippy vtesserad (submit feature)
        run: cargo clippy -p vtesserad --all-targets --features submit -- -D warnings

      - name: Test vtesserad (default features)
        run: cargo test -p vtesserad --locked

      - name: Test vtesserad (submit feature)
        run: cargo test -p vtesserad --locked --features submit

      # Module crates (ROADMAP.md §1–§3). Each ships behind its own
      # clippy + test stanza so a regression in (e.g.) the offer crate
      # doesn't masquerade as a vtesserad failure in CI logs.
      - name: Clippy module crates
        run: |
          cargo clippy -p vtessera-executor --all-targets -- -D warnings
          cargo clippy -p vtessera-offer --all-targets -- -D warnings
          cargo clippy -p vtessera-node-api --all-targets -- -D warnings
          cargo clippy -p vtessera-node-api --features serve --all-targets -- -D warnings
          cargo clippy -p vtessera-settlement --all-targets -- -D warnings

      - name: Test module crates
        run: |
          cargo test -p vtessera-executor --locked
          cargo test -p vtessera-offer --locked
          cargo test -p vtessera-node-api --locked
          cargo test -p vtessera-node-api --features serve --locked
          cargo test -p vtessera-settlement --locked

      # Anchor escrow program (Module 4) lives under programs/ and builds
      # with the Solana BPF toolchain — `anchor build`. It's excluded
      # from the host workspace, so the host CI doesn't try to compile
      # it; a follow-up CI job hosts the Anchor toolchain when the
      # program is wired for devnet deploy.

      - name: Audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

      - name: Deny
        run: |
          cargo install cargo-deny --locked
          cargo deny check

      - name: Build vtesserad (static musl, default features)
        run: cargo build -p vtesserad --release --locked --target x86_64-unknown-linux-musl

      - name: Build vtesserad (static musl, submit feature)
        run: cargo build -p vtesserad --release --locked --features submit --target x86_64-unknown-linux-musl

      - name: systemd-analyze security (best-effort)
        run: |
          sudo apt-get update && sudo apt-get install -y systemd
          systemd-analyze security --no-pager packaging/vtesserad.service || true

      - name: Stage binary artifact
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/vtesserad dist/
        if: github.ref == 'refs/heads/main'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vtesserad-x86_64-unknown-linux-musl
          path: dist/vtesserad
        if: github.ref == 'refs/heads/main'
